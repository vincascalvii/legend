<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="initial-scale=1.0,minimum-scale=1.0,maximum-scale=5.0,width=device-width">
	<meta name="theme-color" content="#333">

	<!-- TITLE & DESCRIPTION -->
	<title>Legend - Lumies Design - Calvin Lam</title>
	<meta name="description" content="Explore all the Lumies from the fantasy world of beautiful & unique creatures. Full Lumies here.">
	<meta name="author" content="Calvin Lam">

	<!-- FONTS -->
	<link rel="preload" as="font" type="font/woff2" href="/fonts/poppins-v12-latin-regular.woff2" crossorigin="anonymous">
	<link rel="preload" as="font" type="font/woff2" href="/fonts/poppins-v12-latin-500.woff2" crossorigin="anonymous">
	<link rel="preload" as="font" type="font/woff2" href="/fonts/poppins-v12-latin-700.woff2" crossorigin="anonymous">
	<link rel="stylesheet" type="text/css" href="/css/fonts.css?version1">

	<!-- CSS -->
	<link rel="stylesheet" type="text/css" href="/legend/css/detail.css">

	<!-- FAVICONS -->
	<link rel="apple-touch-icon" sizes="180x180" href="/legend/img/favicons/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="/legend/img/favicons/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="/legend/img/favicons/favicon-16x16.png">
	<link rel="manifest" href="/legend/img/favicons/site.webmanifest">

	<!-- SEO -->
    <meta property="og:site_name" content="Calvin Lam">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/legend/img/others/opengraph.jpg">
    <meta property="og:url" content="https://vincascalvii.github.io/legend">
    <meta property="og:title" content="Legend - Lumies Design - Calvin Lam">
    <meta property="og:description" content="Explore all the Lumies from the fantasy world of beautiful & unique creatures. Full Lumies here.">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="/legend/img/others/twitter.jpg"> 
    <meta name="twitter:url" content="https://vincascalvii.github.io/legend">
    <meta name="twitter:title" content="Legend - Lumies Design - Calvin Lam">
    <meta name="twitter:description" content="Explore all the Lumies from the fantasy world of beautiful & unique creatures. Full Lumies here.">
</head>
<body>
	<main>
		<div id="background"></div>
		<div class="background-wave">
			<picture>
				<source data-srcset="/legend/img/others/background-wave.webp" type="image/webp">
				<img data-src="/legend/img/others/background-wave.jpg" 
					 src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
					 class="lazyload" alt="Background Wave">
			</picture>
		</div>
		<div class="container">
			<header class="header">
				<a href="/legend" class="back" aria-label="Return to home page">
					<span class="icon">&#60;</span>
					<span class="text">Back</span>
				</a>
				<div class="heading">
					<h1 id="name" class="name"></h1>
					<span class="number"></span>
					<div class="types">
						<span id="type" class="type"></span>
						<div id="attrs" class="attributes">
							<span id="attr1" class="attribute"></span>
						</div>
					</div>
				</div>
				<picture>
					<source data-srcset="/legend/img/others/corner-100x100.webp 1x, /legend/img/others/corner-200x200.webp 2x, /legend/img/others/corner-300x300.webp 3x" type="image/webp">
					<img data-src="/legend/img/others/corner-100x100.png 1x, /legend/img/others/corner-200x200.png 2x, /legend/img/others/corner-300x300.png 3x" 
						 src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
						 class="lazyload background" alt="Corner Background">
				</picture>
			</header>
			<div class="main-container">
				<!-- <div class="shiny-trigger">&#9733;</div> -->
				<div id="image" class="image"></div>
				<div class="arrows">
					<a href="/legend" id="prev-arr" class="arrow left" aria-label="Previous Number">
						<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="arrow-icon">
							<path d="M5 12H19M5 12L11 6M5 12L11 18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
						</svg>
						<span id="prev-num" class="arrow-number"></span>
					</a>
					<a href="/legend" id="next-arr" class="arrow right" aria-label="Next Number">
						<span id="next-num" class="arrow-number"></span>
						<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="arrow-icon">
							<path d="M5 12H19M19 12L13 6M19 12L13 18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
						</svg>
					</a>
				</div>
				<div class="info">
					<ul class="tabs">
						<li class="tab active">Overview</li>
						<li class="tab">Stats</li>
						<li class="tab">Moves</li>
						<li class="tab">Evolution</li>
					</ul>
					<div class="tab-content tab-overview fade active">
						<h2 class="tab-heading">Traits</h2>
						<div class="ability trait-1">
							<h3 id="tr1-name" class="trait-name"></h3>
							<p id="tr1-desc" class="trait-desc"></p>
						</div>
						<div class="ability trait-2">
							<h3 id="tr2-name" class="trait-name"></h3>
							<p id="tr2-desc" class="trait-desc"></p>
						</div>
						<hr class="separator">
						<h2 class="tab-heading">Description</h2>
						<p id="desc" class="description"></p>
						<hr class="separator">
						<h2 class="tab-heading">Additional Details</h2>
						<div class="additional additional-gender">
							<span class="additional-label">Gender</span>
							<span class="additional-value additional-male">
								<svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 48 48">
									<path fill="#2196F3" d="M30.793 4.186H34.793V26.228H30.793z" transform="rotate(44.992 32.795 15.209)"></path>
									<path fill="#2196F3" d="M18 42L18 42c-3.206 0-6.219-1.248-8.485-3.515C7.248 36.219 6 33.205 6 30s1.248-6.219 3.515-8.485C11.781 19.248 14.794 18 18 18s6.219 1.248 8.485 3.515c4.68 4.679 4.68 12.292 0 16.971C24.218 40.752 21.205 42 18 42zM18 22c-2.137 0-4.146.832-5.657 2.343-3.119 3.119-3.119 8.195 0 11.314C13.854 37.168 15.862 38 18 38c2.137 0 4.146-.832 5.657-2.343 3.119-3.119 3.119-8.195 0-11.314C22.146 22.832 20.137 22 18 22zM25 6H42V10H25z"></path>
									<path fill="#2196F3" d="M38 6H42V23H38z"></path>
								</svg>
								<span id="gen-male" class="additional-male-value"></span>
							</span>
							<span class="additional-value additional-female">
								<svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 48 48">
									<path fill="#FF1744" d="M26,25.9c2.4-0.4,4.7-1.5,6.5-3.3c2.3-2.3,3.5-5.3,3.5-8.5c0-3.2-1.2-6.2-3.5-8.5c-2.3-2.3-5.3-3.5-8.5-3.5c-3.2,0-6.2,1.2-8.5,3.5l0,0c-2.3,2.3-3.5,5.3-3.5,8.5c0,5.9,4.3,10.9,10,11.8V34l-8,0l0,4l8,0v8h4v-8l8,0v-4l-8,0V25.9z M16,14.1c0-2.1,0.8-4.1,2.3-5.7c1.5-1.5,3.5-2.3,5.7-2.3c4.4,0,8,3.6,8,8c0,2.1-0.8,4.1-2.3,5.7c-1.5,1.5-3.5,2.3-5.7,2.3C19.6,22.1,16,18.5,16,14.1z"></path>
								</svg>
								<span id="gen-female" class="additional-female-value"></span>
							</span>
						</div>
						<div class="additional additional-species">
							<span class="additional-label">Species</span>
							<span id="species" class="additional-value"></span>
						</div>
						<div class="additional additional-weight">
							<span class="additional-label">Weight</span>
							<span id="weight" class="additional-value"></span>
						</div>
						<div class="additional additional-height">
							<span class="additional-label">Height</span>
							<span id="height" class="additional-value"></span>
						</div>
					</div>
					<div class="tab-content tab-stats fade">
						<h2 class="tab-heading">Base Stats</h2>
						<div class="stats">
							<div class="stat stat-hp">
								<span class="stat-label">HP</span>
								<span id="stt-hp" class="stat-value"></span>
								<span class="stat-bar">
									<span id="sttbar-hp" class="stat-bar-fill"></span>
								</span>
							</div>
							<div class="stat stat-atk">
								<span class="stat-label">ATK</span>
								<span id="stt-atk" class="stat-value"></span>
								<span class="stat-bar">
									<span id="sttbar-atk" class="stat-bar-fill"></span>
								</span>
							</div>
							<div class="stat stat-def">
								<span class="stat-label">DEF</span>
								<span id="stt-def" class="stat-value"></span>
								<span class="stat-bar">
									<span id="sttbar-def" class="stat-bar-fill"></span>
								</span>
							</div>
							<div class="stat stat-spa">
								<span class="stat-label">SPA</span>
								<span id="stt-spa" class="stat-value"></span>
								<span class="stat-bar">
									<span id="sttbar-spa" class="stat-bar-fill"></span>
								</span>
							</div>
							<div class="stat stat-spd">
								<span class="stat-label">SPD</span>
								<span id="stt-spd" class="stat-value"></span>
								<span class="stat-bar">
									<span id="sttbar-spd" class="stat-bar-fill"></span>
								</span>
							</div>
							<div class="stat stat-spe">
								<span class="stat-label">SPE</span>
								<span id="stt-spe" class="stat-value"></span>
								<span class="stat-bar">
									<span id="sttbar-spe" class="stat-bar-fill"></span>
								</span>
							</div>
							<div class="stat stat-total">
								<span class="stat-label">Total</span>
								<span id="stt-ttl" class="stat-value"></span>
							</div>
						</div>
						<hr class="separator">
						<h2 class="tab-heading">Type Effectiveness</h2>
						<div id="type-wkn" class="condition"></div>
						<div id="type-res" class="condition"></div>
						<hr class="separator">
						<h2 class="tab-heading">Attribute Effectiveness</h2>
						<div id="attr-mj-wkn" class="condition"></div>
						<div id="attr-wkn" class="condition"></div>
						<div id="attr-res" class="condition"></div>
						<div id="attr-mj-res" class="condition"></div>
						<div id="attr-imm" class="condition"></div>
					</div>
					<div class="tab-content tab-moves fade">
						<h2 class="tab-heading">Level Up</h2>
						<div id="mv-lvl" class="moves moves-level"></div>
						<hr class="separator">
						<h2 class="tab-heading">Move Tutor</h2>
						<div id="mv-tut" class="moves moves-tutor"></div>
					</div>
					<div class="tab-content tab-evolution fade">
						<h2 class="tab-heading">Evolution</h2>
						<div id="evol" class="evolution"></div>
					</div>
				</div>
			</div>
		</div>
	</main>

	<!-- LAZYSIZES / LAZY LOADING -->
	<script src="/js/lazysizes/lazysizes.min.js"></script>

	<!-- CUSTOM -->
	<script src="/legend/js/detail.js"></script>
</body>
</html>
